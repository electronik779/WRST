name: Build and Publish MAUI Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Имя тега (например, v2026.1)'
        required: true
        type: string
      build_windows:
        description: 'Собрать под Windows (Universal)?'
        required: true
        type: boolean
        default: true
      build_macos:
        description: 'Собрать под macOS (Universal)?'
        required: true
        type: boolean
        default: true

jobs:
  build-windows:
    if: inputs.build_windows == true
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      # Исправлено: передаем фреймворк через -p:TargetFramework
      - name: Restore Windows
        run: dotnet restore WRST.maui/WRST.maui.csproj -p:TargetFramework=net10.0-windows10.0.19041.0

      - name: Build Windows Universal
        run: >
          dotnet publish WRST.maui/WRST.maui.csproj 
          -f net10.0-windows10.0.19041.0 
          -c Release 
          -p:SolutionDir="../"
          -p:_MauiTargetRuntimeIdentifiers="win-x64%3Bwin-arm64" 
          -p:GenerateAppxPackageOnBuild=true 
          -p:AppxPackageSigningEnabled=false

      - name: Prepare Windows Artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./win-out
          Get-ChildItem -Path ./ -Filter *.msix* -Recurse | Where-Object { $_.FullName -notlike "*obj*" } | Copy-Item -Destination ./win-out/
          Compress-Archive -Path ./win-out/* -DestinationPath WRST-Windows-Universal.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-app
          path: WRST-Windows-Universal.zip

  build-macos:
    if: inputs.build_macos == true
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui

      # Исправлено: передаем фреймворк через -p:TargetFramework
      - name: Restore macOS
        run: dotnet restore WRST.maui/WRST.maui.csproj -p:TargetFramework=net10.0-maccatalyst -p:EnableWindowsTargeting=true

      - name: Build macOS Universal
        run: >
          dotnet publish WRST.maui/WRST.maui.csproj 
          -f net10.0-maccatalyst 
          -c Release 
          -p:SolutionDir="../"
          -p:RuntimeIdentifiers="maccatalyst-x64%3Bmaccatalyst-arm64" 
          -p:CreatePackage=true

      - name: Compress macOS Build
        run: |
          PUBLISH_DIR=$(find . -type d -path "*/bin/Release/net10.0-maccatalyst/publish" | head -n 1)
          cd "$PUBLISH_DIR"
          zip -r ../../../../../WRST-macOS-Universal.zip .

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: WRST-macOS-Universal.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: |
      success() && 
      (inputs.build_windows == true || inputs.build_macos == true)
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        if: inputs.build_windows == true
        uses: actions/download-artifact@v4
        with:
          name: win-app

      - name: Download macOS artifact
        if: inputs.build_macos == true
        uses: actions/download-artifact@v4
        with:
          name: mac-app

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ inputs.release_tag }}
          name: Release ${{ inputs.release_tag }}
          draft: false
          prerelease: false
          files: |
            WRST-Windows-Universal.zip
            WRST-macOS-Universal.zip
